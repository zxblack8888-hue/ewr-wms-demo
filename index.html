<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>EWR WMS Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#ffa657;--text:#e6edf3;--sub:#8b949e}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:14px;max-width:480px;margin:0 auto}
/* Tab bar */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99}
.tab{flex:1;padding:13px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.5px;text-transform:uppercase}
.tab.on{color:var(--blue);border-color:var(--blue)}
.page{display:none;padding:12px}
.page.on{display:block}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
/* Form */
label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px}
input[type=text],input[type=number]{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-size:15px;outline:none;margin-bottom:10px}
input:focus{border-color:var(--blue)}
/* Scan box */
.scanbox{background:#0d1117;border:1.5px solid var(--blue);border-radius:8px;padding:12px;min-height:52px;font-family:monospace;font-size:15px;color:var(--blue);text-align:center;margin-bottom:10px;word-break:break-all;cursor:pointer}
.scanbox.empty{color:#484f58;font-size:13px}
/* Item info */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d}
.info-row:last-child{border:none}
.info-label{color:var(--sub);font-size:12px}
.info-val{font-family:monospace;font-size:13px;color:var(--text)}
/* Buttons */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;letter-spacing:.3px}
.btn:active{opacity:.8}
.btn-green{background:#238636;color:#fff}
.btn-blue{background:#1f6feb;color:#fff}
.btn-red{background:#da3633;color:#fff}
.btn-gray{background:#21262d;color:var(--text)}
.btn-row{display:flex;gap:8px}.btn-row .btn{margin:0}
/* Result banner */
.result{border-radius:9px;padding:12px 14px;margin-bottom:10px;display:none}
.result.ok{background:#1a3a1a;border:1px solid #238636;color:var(--green)}
.result.err{background:#3a1a1a;border:1px solid #da3633;color:var(--red)}
.result.show{display:block}
.result-ref{font-size:11px;opacity:.7;margin-top:3px;font-family:monospace}
/* Inventory table */
.inv-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #21262d;gap:8px}
.inv-row:last-child{border:none}
.inv-loc{background:#1a2a3a;color:var(--blue);padding:2px 6px;border-radius:4px;font-size:11px;font-family:monospace;white-space:nowrap}
.inv-name{flex:1;font-size:13px;line-height:1.3}
.inv-qty{font-family:monospace;font-weight:700;font-size:14px;min-width:40px;text-align:right}
.inv-qty.low{color:var(--orange)}
.inv-qty.zero{color:var(--red)}
.inv-unit{color:var(--sub);font-size:11px;min-width:20px}
/* Movement list */
.mv{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #21262d}
.mv:last-child{border:none}
.mv-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.mv-in{background:#1a3a1a;color:var(--green)}
.mv-out{background:#3a1a1a;color:var(--red)}
.mv-info{flex:1}
.mv-name{font-size:13px}
.mv-meta{font-size:11px;color:var(--sub);margin-top:2px;font-family:monospace}
.mv-qty{font-family:monospace;font-weight:700;font-size:14px;text-align:right}
/* Dashboard */
.stat-row{display:flex;gap:8px;margin-bottom:8px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:700;font-family:monospace}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:2px}
.stat-val.warn{color:var(--orange)}
.stat-val.ok{color:var(--green)}
/* Misc */
.empty-hint{text-align:center;color:var(--sub);padding:30px;font-size:13px}
.kbd{display:inline-block;background:#21262d;border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:11px}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab on"  onclick="go('home')">首页</div>
  <div class="tab"     onclick="go('recv')">入库</div>
  <div class="tab"     onclick="go('issue')">出库</div>
  <div class="tab"     onclick="go('inv')">库存</div>
  <div class="tab"     onclick="go('hist')">历史</div>
</div>

<!-- ══ 首页 ══ -->
<div class="page on" id="page-home">
  <div class="stat-row" style="margin-top:10px">
    <div class="stat"><div class="stat-val ok" id="s-total">-</div><div class="stat-lbl">物料种类</div></div>
    <div class="stat"><div class="stat-val warn" id="s-low">-</div><div class="stat-lbl">低库存预警</div></div>
    <div class="stat"><div class="stat-val" id="s-moves">-</div><div class="stat-lbl">今日操作</div></div>
  </div>
  <div class="card">
    <div class="card-title">设备信息</div>
    <div class="info-row"><span class="info-label">JS Bridge</span><span class="info-val" id="h-bridge">-</span></div>
    <div class="info-row"><span class="info-label">设备型号</span><span class="info-val" id="h-model">-</span></div>
    <div class="info-row"><span class="info-label">电量</span><span class="info-val" id="h-bat">-</span></div>
    <div class="info-row"><span class="info-label">网络</span><span class="info-val" id="h-net">-</span></div>
    <div class="info-row"><span class="info-label">后台地址</span><span class="info-val" id="h-api" style="font-size:11px;word-break:break-all">-</span></div>
  </div>
  <div class="card">
    <div class="card-title">快捷操作</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="go('recv')">＋ 入库</button>
      <button class="btn btn-red"   onclick="go('issue')">－ 出库</button>
    </div>
    <button class="btn btn-gray" style="margin-top:8px" onclick="go('inv')">📦 查看库存</button>
  </div>
  <div class="card">
    <div class="card-title">测试条码（点击复制到扫码框）</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px" id="barcodeList"></div>
  </div>
</div>

<!-- ══ 入库 ══ -->
<div class="page" id="page-recv">
  <div class="card" style="margin-top:10px">
    <div class="card-title">扫描条码</div>
    <div class="scanbox empty" id="r-scanbox" onclick="focusScan('r-bc')">点击此处或扫码枪扫描</div>
    <input type="text" id="r-bc" placeholder="手动输入条码" oninput="lookupItem('r','recv')" style="display:none">
  </div>
  <div class="card" id="r-info" style="display:none">
    <div class="card-title">物料信息</div>
    <div class="info-row"><span class="info-label">名称</span><span class="info-val" id="r-name">-</span></div>
    <div class="info-row"><span class="info-label">货位</span><span class="info-val" id="r-loc">-</span></div>
    <div class="info-row"><span class="info-label">现有库存</span><span class="info-val" id="r-stock">-</span></div>
  </div>
  <div class="card" id="r-form" style="display:none">
    <div class="card-title">入库数量</div>
    <label>数量</label>
    <input type="number" id="r-qty" value="1" min="1">
    <div class="result" id="r-result"></div>
    <button class="btn btn-green" onclick="submit('recv')">✓ 确认入库</button>
    <button class="btn btn-gray"  onclick="clearForm('r')">重置</button>
  </div>
</div>

<!-- ══ 出库 ══ -->
<div class="page" id="page-issue">
  <div class="card" style="margin-top:10px">
    <div class="card-title">扫描条码</div>
    <div class="scanbox empty" id="i-scanbox" onclick="focusScan('i-bc')">点击此处或扫码枪扫描</div>
    <input type="text" id="i-bc" placeholder="手动输入条码" oninput="lookupItem('i','issue')" style="display:none">
  </div>
  <div class="card" id="i-info" style="display:none">
    <div class="card-title">物料信息</div>
    <div class="info-row"><span class="info-label">名称</span><span class="info-val" id="i-name">-</span></div>
    <div class="info-row"><span class="info-label">货位</span><span class="info-val" id="i-loc">-</span></div>
    <div class="info-row"><span class="info-label">可用库存</span><span class="info-val" id="i-stock">-</span></div>
  </div>
  <div class="card" id="i-form" style="display:none">
    <div class="card-title">出库数量</div>
    <label>数量</label>
    <input type="number" id="i-qty" value="1" min="1">
    <div class="result" id="i-result"></div>
    <button class="btn btn-red"  onclick="submit('issue')">✓ 确认出库</button>
    <button class="btn btn-gray" onclick="clearForm('i')">重置</button>
  </div>
</div>

<!-- ══ 库存 ══ -->
<div class="page" id="page-inv">
  <div class="card" style="margin-top:10px">
    <input type="text" id="inv-search" placeholder="搜索物料名称或货位…" oninput="renderInv()" style="margin:0">
  </div>
  <div class="card" id="inv-list"><div class="empty-hint">加载中...</div></div>
</div>

<!-- ══ 历史 ══ -->
<div class="page" id="page-hist">
  <div class="card" style="margin-top:10px">
    <div class="btn-row">
      <button class="btn btn-gray" onclick="loadHist()">刷新</button>
      <button class="btn btn-red"  onclick="resetData()">重置数据</button>
    </div>
  </div>
  <div class="card" id="hist-list"><div class="empty-hint">暂无记录</div></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = (()=>{
  const h = location.hostname;
  if(h==='localhost'||h==='127.0.0.1'||h==='10.0.2.2') return location.origin;
  return location.origin; // same origin on production server
})();

// ── State ─────────────────────────────────────────────────────────────────────
let inventory = [];
let currentBarcode = {r:'', i:''};

// ── EWR JS Bridge helpers ─────────────────────────────────────────────────────
const A = window.Android;
const vibOk  = ()=> A && A.vibrate(80);
const vibErr = ()=> A && A.vibratePattern && A.vibratePattern('[0,100,80,100]') || (A && A.vibrate(300));
const beepOk = ()=> A && A.beep();
const beepErr= ()=> A && A.beepError();

// Scan result delivered by EWR
function onScanResult(data) {
  data = data.trim();
  const page = document.querySelector('.page.on').id;
  if(page==='page-recv'){
    document.getElementById('r-bc').value = data;
    lookupItem('r','recv');
  } else if(page==='page-issue'){
    document.getElementById('i-bc').value = data;
    lookupItem('i','issue');
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.page,.tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  const tabs={home:0,recv:1,issue:2,inv:3,hist:4};
  document.querySelectorAll('.tab')[tabs[id]].classList.add('on');
  if(id==='inv') loadInv();
  if(id==='hist') loadHist();
  if(A) A.enableScanner && A.enableScanner();
}

// ── Item lookup ───────────────────────────────────────────────────────────────
let lookupTimer = null;
function lookupItem(pfx, op) {
  clearTimeout(lookupTimer);
  const bc = document.getElementById(pfx+'-bc').value.trim();
  currentBarcode[pfx] = bc;
  const box = document.getElementById(pfx+'-scanbox');
  if(!bc){ box.textContent='点击此处或扫码枪扫描'; box.className='scanbox empty'; hideInfo(pfx); return; }
  box.textContent = bc; box.className='scanbox';
  lookupTimer = setTimeout(()=>_fetchItem(pfx, op, bc), 300);
}

async function _fetchItem(pfx, op, bc) {
  try {
    const r = await fetch(`${API}/api/item/${bc}`);
    const d = await r.json();
    if(!r.ok){ showErr(pfx, d.error||'物料未找到'); vibErr(); beepErr(); return; }
    document.getElementById(pfx+'-name').textContent  = d.name;
    document.getElementById(pfx+'-loc').textContent   = d.location;
    const stockEl = document.getElementById(pfx+'-stock');
    stockEl.textContent = `${d.stock} ${d.unit}`;
    if(d.stock===0)      stockEl.style.color='var(--red)';
    else if(d.stock<d.min) stockEl.style.color='var(--orange)';
    else                 stockEl.style.color='var(--green)';
    document.getElementById(pfx+'-info').style.display='block';
    document.getElementById(pfx+'-form').style.display='block';
    document.getElementById(pfx+'-result').className='result';
    vibOk();
  } catch(e){ showErr(pfx,'网络错误: '+e.message); }
}

function hideInfo(pfx){
  ['info','form'].forEach(s=>document.getElementById(pfx+'-'+s).style.display='none');
  document.getElementById(pfx+'-result').className='result';
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submit(op) {
  const pfx  = op==='recv'?'r':'i';
  const bc   = currentBarcode[pfx];
  const qty  = parseInt(document.getElementById(pfx+'-qty').value)||0;
  if(!bc||qty<=0){ showErr(pfx,'请先扫码并输入数量'); return; }
  try {
    const r = await fetch(`${API}/api/${op}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({barcode:bc, qty})
    });
    const d = await r.json();
    if(!r.ok){ showErr(pfx, d.error||'操作失败'); vibErr(); beepErr(); return; }
    const typeLabel = op==='recv'?'入库':'出库';
    showOk(pfx, `${typeLabel}成功 ＋${qty}${' '.repeat(2)}库存: ${d.stock_after}\n单据: ${d.ref}  货位: ${d.location}`);
    vibOk(); beepOk();
    if(d.low_stock && A) A.showToast && A.showToast('⚠ 库存预警: '+d.name);
    // ZPL label print (if printer configured)
    if(A && A.printZpl) {
      const zpl=`^XA^FO30,30^ADN,18,10^FD${typeLabel}: ${d.name}^FS^FO30,60^ADN,14,8^FDBatch: ${d.ref}^FS^FO30,85^ADN,14,8^FDQty: ${qty} Loc: ${d.location}^FS^XZ`;
      try{ A.printZpl(zpl); }catch(e){}
    }
    // auto clear after 3s
    setTimeout(()=>clearForm(pfx), 3000);
  } catch(e){ showErr(pfx,'网络错误: '+e.message); vibErr(); }
}

function showOk(pfx, msg) {
  const el = document.getElementById(pfx+'-result');
  el.innerHTML = '✓ ' + msg.replace('\n','<div class="result-ref">') + '</div>';
  el.className='result ok show';
}
function showErr(pfx, msg) {
  const el = document.getElementById(pfx+'-result');
  el.innerHTML = '✗ ' + msg;
  el.className='result err show';
}

function clearForm(pfx) {
  document.getElementById(pfx+'-bc').value='';
  currentBarcode[pfx]='';
  const box=document.getElementById(pfx+'-scanbox');
  box.textContent='点击此处或扫码枪扫描'; box.className='scanbox empty';
  hideInfo(pfx);
  document.getElementById(pfx+'-qty').value=1;
}

function focusScan(id) {
  const el=document.getElementById(id);
  el.style.display='block'; el.focus();
}

// ── Inventory ─────────────────────────────────────────────────────────────────
async function loadInv() {
  const r = await fetch(`${API}/api/inventory`);
  inventory = await r.json();
  renderInv();
  updateDashboard();
}

function renderInv() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const filtered = inventory.filter(it=>
    !q || it.name.toLowerCase().includes(q) || it.location.toLowerCase().includes(q)
  );
  const el = document.getElementById('inv-list');
  if(!filtered.length){ el.innerHTML='<div class="empty-hint">无匹配物料</div>'; return; }
  el.innerHTML = filtered.map(it=>`
    <div class="inv-row">
      <span class="inv-loc">${it.location}</span>
      <span class="inv-name">${it.name}</span>
      <span class="inv-qty ${it.stock===0?'zero':it.stock<it.min?'low':''}">${it.stock}</span>
      <span class="inv-unit">${it.unit}</span>
    </div>`).join('');
}

function updateDashboard() {
  document.getElementById('s-total').textContent = inventory.length;
  document.getElementById('s-low').textContent   = inventory.filter(i=>i.stock<i.min).length;
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHist() {
  const r = await fetch(`${API}/api/movements`);
  const mvs = await r.json();
  document.getElementById('s-moves').textContent = mvs.length;
  const el = document.getElementById('hist-list');
  if(!mvs.length){ el.innerHTML='<div class="empty-hint">暂无操作记录</div>'; return; }
  el.innerHTML = mvs.map(m=>`
    <div class="mv">
      <span class="mv-badge ${m.type==='入库'?'mv-in':'mv-out'}">${m.type}</span>
      <div class="mv-info">
        <div class="mv-name">${m.name}</div>
        <div class="mv-meta">${m.ref} · ${m.location} · ${m.time}</div>
      </div>
      <div class="mv-qty" style="color:${m.type==='入库'?'var(--green)':'var(--red)'}">
        ${m.type==='入库'?'+':'-'}${m.qty}
      </div>
    </div>`).join('');
}

async function resetData() {
  if(!confirm('重置所有库存数据？')) return;
  await fetch(`${API}/api/reset`, {method:'POST'});
  await loadInv(); await loadHist();
  vibOk();
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async ()=>{
  document.getElementById('h-api').textContent = API;

  // JS Bridge
  const hasA = typeof A !== 'undefined';
  document.getElementById('h-bridge').textContent = hasA ? '已连接 ✓' : '未连接（模拟器）';
  document.getElementById('h-bridge').style.color = hasA ? 'var(--green)' : 'var(--orange)';

  if(hasA) {
    try{
      const info = JSON.parse(A.getDeviceInfo());
      document.getElementById('h-model').textContent = info.model||'-';
    }catch(e){}
    try{
      const bat = JSON.parse(A.getBatteryInfo());
      document.getElementById('h-bat').textContent = bat.level+'% '+(bat.charging?'⚡':'');
    }catch(e){}
    try{
      const net = JSON.parse(A.getNetworkStatus());
      document.getElementById('h-net').textContent = (net.connected?'✓ ':'✗ ')+(net.type||'');
    }catch(e){}
    if(A.enableScanner) A.enableScanner();
  }

  // Barcode shortcuts on homepage
  const barcodes = [
    ['6901234567890','螺栓'],['6901234567891','轴承'],['6901234567892','密封圈'],
    ['6901234567893','液压油'],['6901234567894','过滤网'],['6901234567897','控制板'],
  ];
  document.getElementById('barcodeList').innerHTML = barcodes.map(([bc,name])=>
    `<button onclick="useBc('${bc}')" style="background:#161b22;border:1px solid #30363d;color:#58a6ff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">${name}</button>`
  ).join('');

  await loadInv();
  await loadHist();
});

function useBc(bc) {
  const page = document.querySelector('.page.on').id;
  if(page==='page-recv'||page==='page-home'){
    go('recv');
    setTimeout(()=>{
      document.getElementById('r-bc').value=bc;
      lookupItem('r','recv');
    },100);
  } else {
    go('issue');
    setTimeout(()=>{
      document.getElementById('i-bc').value=bc;
      lookupItem('i','issue');
    },100);
  }
}
</script>
</body>
</html>
